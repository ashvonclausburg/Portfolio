<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Invoices Null State Redesign — Ashley vonClausburg</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/style.css" />
    <link rel="stylesheet" href="/src/type.css" />
    <link rel="stylesheet" href="/src/case-study-v1.css" />
  </head>
  <body>

    <!-- NAV -->
    <nav>
      <a class="nav-name" href="/">Ashley vonClausburg</a>
      <div class="nav-links">
        <a href="/#work">Work</a>
        <a href="/#about">About</a>
        <a href="mailto:ashley@vonclausburg.com">Contact</a>
      </div>
    </nav>

    <!-- CASE STUDY HERO -->
    <header class="cs-hero">
      <div class="cs-hero-inner">
        <div class="cs-hero-text">
          <p class="cs-label">Case Study · Product Design</p>
          <h1 class="cs-title">Invoices Null State<br>Redesign</h1>
          <p class="cs-subtitle">Using insights and instincts, increased the invoices null state CTR by ~20%</p>
          <div class="cs-meta-row">
            <div class="cs-meta-item">
              <span class="cs-meta-label">Company</span>
              <span class="cs-meta-value">Square</span>
            </div>
            <div class="cs-meta-item">
              <span class="cs-meta-label">Role</span>
              <span class="cs-meta-value">Product Designer</span>
            </div>
            <div class="cs-meta-item">
              <span class="cs-meta-label">Focus</span>
              <span class="cs-meta-value">UX, Conversion</span>
            </div>
          </div>
        </div>
        <div class="cs-hero-image">
          <img src="/images/NullState/NullState.png" alt="Invoices null state redesign" />
        </div>
      </div>
    </header>

    <!-- LIGHTBOX -->
    <div id="cs-lightbox" class="cs-lightbox" onclick="closeLightbox()">
      <button class="cs-lightbox-close" onclick="closeLightbox()" aria-label="Close">&times;</button>
      <img src="" alt="" onclick="event.stopPropagation()" />
    </div>

    <!-- NAV FOOTER -->
    <footer class="cs-footer">
      <a href="/" class="cs-back">← Back to work</a>
      <p class="cs-footer-copy">© 2026 Ashley vonClausburg</p>
    </footer>

    <script type="module" src="/src/main.js"></script>
    <script>
      function openLightbox(src, alt) {
        const lb = document.getElementById('cs-lightbox');
        lb.querySelector('img').src = src;
        lb.querySelector('img').alt = alt || '';
        lb.classList.add('is-open');
        document.body.style.overflow = 'hidden';
      }
      function closeLightbox() {
        document.getElementById('cs-lightbox').classList.remove('is-open');
        document.body.style.overflow = '';
      }
      document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
    </script>
  </body>
</html>
